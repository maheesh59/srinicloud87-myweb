apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  labels:
    app: sample-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: sample-app
        image: maheesh1/sample-web:7
        imagePullPolicy: "Always"
        ports:
        - containerPort: 3000
